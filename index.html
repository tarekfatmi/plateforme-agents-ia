<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAS v3.0 - Direction d'Entreprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-business">

    <!-- ÉCRAN DE VERROUILLAGE (MOT DE PASSE PAR DÉFAUT = 1234) -->
    <div class="ecran-verrouillage" id="gatekeeper">
        <div class="bloc-auth">
            <h2 style="font-size: 3rem; color: #b39459; text-transform: uppercase;">Accès Sécurisé CAS</h2>
            <p style="font-size: 1.8rem; color: #a1a1a6; margin-top: 8px;">Entrez votre clé d'accès entreprise unique</p>
            <input type="text" class="input-code" id="access-key" placeholder="Tapez 1234 pour tester">
            <button class="btn-action-unique" style="height: auto; padding: 12px;" onclick="GateKeeper.verifyAccess()">Activer la Session</button>
            <hr style="border-color: rgba(179, 148, 89, 0.2); margin: 24px 0;">
            <p style="font-size: 1.6rem; color: #ffffff;">Pas encore de clé valide ?</p>
            <button class="btn-pay" onclick="GateKeeper.redirectToSobflous()">Acheter un accès via Sobflous (35 TND)</button>
        </div>
    </div>

    <!-- STRUCTURE PRINCIPALE -->
    <header class="banniere-haut">
        <h1 class="titre-principal">CAS v3.0</h1>
        <div class="sous-titre" id="sub-state-title">BUSINESS COGNITIVE SYSTEM</div>
    </header>

    <main class="module-chat-central">
        <div class="chat-history" id="chat-viewport"></div>
    </main>

    <section class="zone-reponse-dynamique" id="response-viewport"></section>

    <footer class="barre-commande-bas">
        <button class="btn-systeme" onclick="CHAS.forceReset()"><span style="font-size:1.5vh; color:#b39459; font-weight:600;">RESET</span></button>
    </footer>

    <!-- CHARGEMENT DU LOGICIEL LOGIQUE -->
    <script src="business.js" defer></script>
</body>
</html>
